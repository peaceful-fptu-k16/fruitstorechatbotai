services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fruit-chatbot-backend
    environment:
      DATABASE_URL: sqlite:///./backend/data/fruit_chatbot.db
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-30}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      CORS_ORIGINS: '["*"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fruit-chatbot-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
